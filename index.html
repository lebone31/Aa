<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Make a Wish</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle, #111, #000);
        font-family: Arial, sans-serif;
        color: white;
    }

    /* BALLOONS */
    .balloon {
        position: absolute;
        bottom: -100px;
        width: 25px;
        height: 35px;
        border-radius: 50%;
        opacity: 0.8;
        animation: floatUp 8s linear infinite;
    }

    @keyframes floatUp {
        from { transform: translateY(0); }
        to { transform: translateY(-120vh); }
    }

    /* CENTER */
    .container {
        text-align: center;
        position: relative;
        z-index: 2;
    }

    /* CAKE */
    .cake {
        width: 220px;
        height: 140px;
        background: linear-gradient(#fff, #ddd);
        border-radius: 20px;
        position: relative;
        margin: 0 auto;
        box-shadow: 0 0 30px rgba(255,255,255,0.15);
    }

    /* ICING LAYER */
    .cake::before {
        content: "";
        position: absolute;
        top: -20px;
        left: 0;
        width: 100%;
        height: 40px;
        background: #ffffff;
        border-radius: 20px;
    }

    /* CANDLES */
    .candle {
        width: 10px;
        height: 50px;
        background: #fff;
        position: absolute;
        top: -60px;
        border-radius: 5px;
    }

    .candle:nth-child(1) { left: 60px; }
    .candle:nth-child(2) { left: 105px; }
    .candle:nth-child(3) { left: 150px; }

    /* FLAME */
    .flame {
        width: 14px;
        height: 14px;
        background: radial-gradient(circle, #fff7a0, #ff9800, #ff4d00);
        border-radius: 50%;
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        box-shadow: 0 0 15px orange;
        animation: flicker 0.15s infinite alternate;
    }

    @keyframes flicker {
        from { transform: translateX(-50%) scale(1); }
        to { transform: translateX(-50%) scale(1.2); }
    }

    .hidden { display: none; }

    /* POPUP */
    .popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        color: black;
        padding: 25px 35px;
        border-radius: 16px;
        font-size: 26px;
        display: none;
        z-index: 10;
        box-shadow: 0 0 40px rgba(255,255,255,0.25);
    }

    /* CONFETTI */
    .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        top: -10px;
        animation: fall 2.5s linear forwards;
        z-index: 5;
    }

    @keyframes fall {
        to {
            transform: translateY(110vh) rotate(720deg);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <div class="cake">
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
    </div>
</div>

<div class="popup" id="popup">✨ Make a Wish ✨</div>
