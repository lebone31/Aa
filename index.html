<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Make a Wish</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
    flex-direction: column;
}

/* TEXT */
h1 {
    font-weight: 300;
    margin-bottom: 30px;
    opacity: 0.9;
}

/* CANDLE */
.candle {
    width: 40px;
    height: 160px;
    background: linear-gradient(#fff, #dcdcdc);
    border-radius: 10px;
    position: relative;
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

/* FLAME */
.flame {
    width: 22px;
    height: 22px;
    background: radial-gradient(circle, #fff7a0, orange, red);
    border-radius: 50%;
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 25px orange;
    animation: glow 0.2s infinite alternate;
}

@keyframes glow {
    from { transform: translateX(-50%) scale(1); }
    to { transform: translateX(-50%) scale(1.2); }
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: fall 2s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1>Make a Wish</h1>

<div class="candle">
    <div class="flame" id="flame"></div>
</div>

<script>
let flame = document.getElementById("flame");
let blown = false;

function confetti() {
    for (let i = 0; i < 100; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = ["red","yellow","blue","green","purple"][Math.floor(Math.random()*5)];
        c.style.animationDuration = (Math.random() * 2 + 1) + "s";
        document.body.appendChild(c);

        setTimeout(() => c.remove(), 3000);
    }
}

navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
    const audioContext = new AudioContext();
    const mic = audioContext.createMediaStreamSource(stream);

    const analyser = audioContext.createAnalyser();
    analyser.fftSize = 512;

    mic.connect(analyser);

    const data = new Uint8Array(analyser.fftSize);

    function detect() {
        analyser.getByteTimeDomainData(data);

        let sum = 0;
        for (let i = 0; i < data.length; i++) {
            let v = data[i] - 128;
            sum += v * v;
        }

        let volume = Math.sqrt(sum / data.length);

        if (volume > 12 && !blown) {
            blown = true;

            flame.style.display = "none";
            confetti();
        }

        requestAnimationFrame(detect);
    }

    detect();
})
.catch(() => {
    alert("Please allow microphone access to blow the candle.");
});
</script>

</body>
</html>
